name: Signed release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUST_TOOLCHAIN_VERSION: 1.96.1
  LIBGHOSTTY_VT_OPTIMIZE: ReleaseFast
  LIBGHOSTTY_VT_SIMD: "true"

jobs:
  build:
    if: github.repository == 'Cod-Hash-Studios/nagi'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, asset: nagi-linux-x86_64 }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl, asset: nagi-linux-aarch64 }
          - { os: macos-15, target: x86_64-apple-darwin, asset: nagi-macos-x86_64 }
          - { os: macos-15, target: aarch64-apple-darwin, asset: nagi-macos-aarch64 }
          - { os: windows-2025, target: x86_64-pc-windows-msvc, asset: nagi-windows-x86_64.exe }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          targets: ${{ matrix.target }}
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        if: runner.os != 'macOS'
        with:
          version: 0.15.2
      - name: Verify tag
        shell: bash
        run: test "${GITHUB_REF_NAME#v}" = "$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)"
      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build musl-tools gcc-aarch64-linux-gnu crossbuild-essential-arm64
      - name: Set Linux aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install cmake ninja zig@0.15
          echo "$(brew --prefix zig@0.15)/bin" >> "$GITHUB_PATH"
          "$(brew --prefix zig@0.15)/bin/zig" version
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Stage Unix artifact
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/nagi ${{ matrix.asset }}
      - name: Stage Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/${{ matrix.target }}/release/nagi.exe ${{ matrix.asset }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  publish:
    if: github.repository == 'Cod-Hash-Studios/nagi'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: release
          merge-multiple: true
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Generate checksums, SPDX SBOM, and provenance
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: python3 scripts/assemble_release.py release --version "${VERSION#v}" --commit "$COMMIT"
      - name: Verify assembled release
        run: python3 scripts/verify_release.py release --version "${GITHUB_REF_NAME#v}" --commit "$GITHUB_SHA"
      - name: Sign every release payload with GitHub OIDC
        run: |
          set -euo pipefail
          for file in \
            release/nagi-linux-x86_64 \
            release/nagi-linux-aarch64 \
            release/nagi-macos-x86_64 \
            release/nagi-macos-aarch64 \
            release/nagi-windows-x86_64.exe \
            release/checksums.sha256 \
            release/provenance.json \
            release/sbom.spdx.json; do
            cosign sign-blob --yes --bundle "$file.sigstore.json" "$file"
          done
      - name: Verify signed release payloads
        run: |
          python3 scripts/verify_release.py release \
            --version "${GITHUB_REF_NAME#v}" \
            --commit "$GITHUB_SHA" \
            --require-signatures \
            --certificate-identity-regexp '^https://github\.com/Cod-Hash-Studios/nagi/\.github/workflows/release\.yml@refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$'
      - name: Attest release binaries
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            release/nagi-linux-x86_64
            release/nagi-linux-aarch64
            release/nagi-macos-x86_64
            release/nagi-macos-aarch64
            release/nagi-windows-x86_64.exe
      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: release/*
          fail_on_unmatched_files: true
