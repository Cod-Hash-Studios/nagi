name: Performance

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regression-smoke:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # v1
        with:
          toolchain: 1.96.1
      - run: HOMEBREW_NO_AUTO_UPDATE=1 brew install zig@0.15
      - run: echo "$(brew --prefix zig@0.15)/bin" >> "$GITHUB_PATH"
      - run: just bench-smoke
