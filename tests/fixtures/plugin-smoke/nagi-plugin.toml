id = "example.smoke"
name = "Smoke Plugin"
version = "0.1.0"
min_nagi_version = "0.6.10"
description = "Portable plugin smoke fixture"
platforms = ["linux", "macos", "windows"]

[[actions]]
id = "workspace-list"
title = "List workspaces"
contexts = ["workspace"]
command = ["nagi", "workspace", "list"]

[[events]]
on = "worktree.created"
command = ["nagi", "plugin", "log", "list", "--plugin", "example.smoke"]

[[panes]]
id = "board"
title = "Board"
placement = "overlay"
command = ["nagi", "workspace", "list"]
