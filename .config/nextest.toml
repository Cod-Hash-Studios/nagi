nextest-version = "0.9.137"

# Provider process fixtures perform real handshakes and some OpenCode fixtures
# start a local Python HTTP server. Run them with the complete slot budget so
# loaded runners cannot starve their deliberately short test deadlines.
[[profile.default.overrides]]
filter = 'test(/^(managed_provider::conformance::lifecycle::first_party_adapters_|managed_provider::(codex|claude)::tests::actor_|server::headless::tests::(managed_mission_start_wires_the_registered_opencode_adapter|managed_handoff_starts_the_target_provider_from_the_inspected_artifact|new_mission_launch_creates_an_isolated_worktree_before_provider_start))/)'
threads-required = "num-cpus"
