<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-labelledby="title desc">
  <title id="title">Nagi</title>
  <desc id="desc">Nagi wordmark with a vermilion sun and calm indigo water.</desc>
  <defs>
    <filter id="paper" x="-5%" y="-10%" width="110%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="18" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="faded">
        <feFuncA type="table" tableValues="0 0.045"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="faded" mode="multiply"/>
    </filter>
  </defs>

  <g filter="url(#paper)">
    <rect width="1280" height="320" rx="48" fill="#F7F1E3"/>

    <g transform="translate(50 34) scale(.49)">
      <rect x="20" y="20" width="472" height="472" rx="104" fill="#FBF7EC"/>
      <circle cx="355" cy="151" r="51" fill="#EF624D"/>
      <path d="M-24 300C74 225 131 229 207 291C274 346 344 349 536 245"
            fill="none" stroke="#23395B" stroke-width="31" stroke-linecap="round"/>
      <path d="M-20 345C88 268 144 276 218 326C292 377 377 369 540 287"
            fill="none" stroke="#80CFC4" stroke-width="22" stroke-linecap="round"/>
      <path d="M-26 393C90 320 165 331 239 366C323 406 402 386 542 331"
            fill="none" stroke="#23395B" stroke-width="13" stroke-linecap="round" opacity="0.9"/>
      <path d="M88 430C188 414 309 415 440 429" fill="none" stroke="#23395B"
            stroke-width="8" stroke-linecap="round" opacity="0.55"/>
    </g>

    <text x="354" y="184" fill="#23395B" font-family="Georgia, 'Times New Roman', serif"
          font-size="144" font-weight="600" letter-spacing="24">NAGI</text>
    <text x="365" y="246" fill="#526575" font-family="Avenir Next, Inter, sans-serif"
          font-size="24" font-weight="500" letter-spacing="7">CALM FOR AGENT WORK</text>

    <g transform="translate(1120 96)">
      <rect width="112" height="112" rx="10" fill="#EF624D"/>
      <text x="56" y="80" text-anchor="middle" fill="#F7F1E3"
            font-family="Yu Mincho, Hiragino Mincho ProN, serif" font-size="69">凪</text>
    </g>
  </g>
</svg>
