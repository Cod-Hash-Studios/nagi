<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Nagi brand mark</title>
  <desc id="desc">A vermilion sun above indigo and seafoam brush strokes settling into calm water.</desc>
  <defs>
    <filter id="paper" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="faded">
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="faded" mode="multiply"/>
    </filter>
    <clipPath id="tile">
      <rect x="20" y="20" width="472" height="472" rx="104"/>
    </clipPath>
  </defs>

  <g clip-path="url(#tile)" filter="url(#paper)">
    <rect x="20" y="20" width="472" height="472" rx="104" fill="#F7F1E3"/>
    <circle cx="355" cy="151" r="51" fill="#EF624D"/>

    <path d="M-24 300C74 225 131 229 207 291C274 346 344 349 536 245"
          fill="none" stroke="#23395B" stroke-width="31" stroke-linecap="round"/>
    <path d="M-20 345C88 268 144 276 218 326C292 377 377 369 540 287"
          fill="none" stroke="#80CFC4" stroke-width="22" stroke-linecap="round"/>
    <path d="M-26 393C90 320 165 331 239 366C323 406 402 386 542 331"
          fill="none" stroke="#23395B" stroke-width="13" stroke-linecap="round" opacity="0.9"/>

    <path d="M88 430C188 414 309 415 440 429" fill="none" stroke="#23395B"
          stroke-width="8" stroke-linecap="round" opacity="0.55"/>
    <path d="M151 449C231 442 309 442 378 449" fill="none" stroke="#80CFC4"
          stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  </g>

  <rect x="20" y="20" width="472" height="472" rx="104" fill="none"
        stroke="#23395B" stroke-width="8" opacity="0.16"/>
</svg>
